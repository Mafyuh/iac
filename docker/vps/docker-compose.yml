---
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
services:
  gotify:
    image: ghcr.io/gotify/server:2.9.1
    container_name: gotify
    volumes:
      - /docker/appdata/gotify:/app/data
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - GOTIFY_DEFAULTUSER_NAME=$GOTIFY_DEFAULTUSER_NAME
      - GOTIFY_DEFAULTUSER_PASS=$GOTIFY_DEFAULTUSER_PASS
    networks:
      - racknerd
    labels:
      caddy: $GOTIFY_HOSTNAME
      caddy.reverse_proxy: "{{upstreams 80}}"

  caddy:
    image: ghcr.io/homeall/caddy-reverse-proxy-cloudflare:2026.06.23
    container_name: caddy
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
      - 127.0.0.1:2019:2019
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /docker/appdata/caddy/data:/data
      - /docker/appdata/caddy/config:/config
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - /docker/appdata/caddy/logs:/var/log/
    environment:
      - TZ=America/New_York
      - CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN
      - CADDY_DOCKER_CADDYFILE_PATH=/etc/caddy/generated
    restart: unless-stopped
    networks:
      - racknerd
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  fail2ban:
    image: mirror.gcr.io/crazymax/fail2ban:1.1.0
    container_name: fail2ban-caddy
    network_mode: "host"
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - "/docker/appdata/fail2ban-caddy/data:/data"
      - "/var/log/auth.log:/var/log/auth.log:ro"
      - "/docker/appdata/caddy/logs:/log/caddy:ro"
      - "/docker/appdata/fail2ban-caddy/f2b-logs:/f2b-logs:rw"
      - "./config/fail2ban-jail.conf:/data/jail.d/caddy.conf:ro"
      - "./config/fail2ban-action-iptables.conf:/data/action.d/iptables-custom.conf:ro"
      - "./config/caddy-auth.conf:/data/filter.d/caddy-auth.conf:ro"
      - "./config/caddy-botsearch.conf:/data/filter.d/caddy-botsearch.conf:ro"
      - "./config/caddy-limit.conf:/data/filter.d/caddy-limit.conf:ro"
    environment:
      - TZ=America/New_York
      - F2B_LOG_TARGET=/f2b-logs/fail2ban.log
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGE_AGE=1d
      - F2B_MAX_RETRY=3
      - SSMTP_HOST=$SSMTP_HOST
      - SSMTP_PORT=587
      - SSMTP_HOSTNAME=$SSMTP_HOSTNAME
      - SSMTP_USER=$SSMTP_USER
      - SSMTP_PASSWORD=$SSMTP_PASSWORD
      - SSMTP_TLS=YES
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "10"
    restart: unless-stopped
    depends_on:
      - caddy

  n8n:
    image: ghcr.io/n8n-io/n8n:2.28.0
    container_name: n8n
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - GENERIC_TIMEZONE=America/New_York
      - TZ=America/New_York
      - WEBHOOK_URL=$WEBHOOK_URL
      - N8N_ENCRYPTION_KEY=$N8N_ENCRYPTION_KEY
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=vaultwarden
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_SSL_ENABLED=false
    restart: unless-stopped
    networks:
      - racknerd
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      caddy: $N8N_HOSTNAME
      caddy.reverse_proxy: "{{upstreams 5678}}"

  vaultwarden:
    image: ghcr.io/dani-garcia/vaultwarden:1.36.0
    container_name: vaultwarden
    volumes:
      - /home/mafyuh/vw-data/:/data
    environment:
      - DOMAIN=$VWDOMAIN
      - SIGNUPS_ALLOWED=true
      - SSO_ENABLED=true
      - SSO_AUTHORITY=https://auth.mafyuh.io/application/o/vaultwarden/
      - SSO_SCOPES="openid email profile offline_access"
      - SSO_ONLY=true
      - SSO_AUTH_ONLY_NOT_SESSION=true
      - SSO_CLIENT_ID=e17019c548f26f15e483b74b2b0a95e8900a03bb
      - SSO_CLIENT_SECRET=$SSO_CLIENT_SECRET
      - SMTP_HOST=smtp.protonmail.ch
      - SMTP_FROM=noreply@mafyuh.dev
      - SMTP_FROM_NAME=Vaultwarden
      - SMTP_USERNAME=noreply@mafyuh.dev
      - SMTP_PASSWORD=$SMTP_PASSWORD
      - SMTP_TIMEOUT=15
      - SMTP_SECURITY=starttls
      - SMTP_PORT=587
      - DATABASE_URL=$DATABASE_URL
    restart: unless-stopped
    networks:
      - racknerd
    labels:
      caddy: $VW_HOSTNAME
      caddy.reverse_proxy: "{{upstreams 80}}"

  postgres:
    image: postgres:18.4
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vaultwarden
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vaultwarden
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - racknerd

  databasus:
    image: mirror.gcr.io/databasus/databasus:v3.45.0
    container_name: databasus
    volumes:
      - databasus_data:/databasus-data
    restart: unless-stopped
    networks:
      - racknerd
    labels:
      caddy: $DATABASUS_HOSTNAME
      caddy.reverse_proxy: "{{upstreams 4005}}"

  forgejo:
    image: data.forgejo.org/forgejo/forgejo:15.0.3
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=forgejo
      - GITEA__database__USER=vaultwarden
      - GITEA__database__PASSWD=$POSTGRES_PASSWORD
      - GITEA__openid__ENABLE_OPENID_SIGNIN=false
      - GITEA__oauth2_client__ENABLE_AUTO_REGISTRATION=true
      - GITEA__oauth2_client__USERNAME=preferred_username
      - GITEA__oauth2_client__UPDATE_AVATAR=true
      - GITEA__oauth2_client__OPENID_CONNECT_SCOPES=openid email profile
      - GITEA__service__ALLOW_ONLY_EXTERNAL_REGISTRATION=true
      - GITEA__service__DISABLE_REGISTRATION=false
    restart: always
    networks:
      - racknerd
    volumes:
      - forgejo_data:/data
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      caddy: git.mafyuh.io
      caddy.reverse_proxy: "{{upstreams 3000}}"

networks:
  racknerd:
    external: true

volumes:
  linkstack:
  n8n_data:
  postgres_data:
  databasus_data:
  forgejo_data:
