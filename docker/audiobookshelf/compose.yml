---
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.33.1
    container_name: audiobookshelf
    environment:
      - TZ=America/New_York
    volumes:
      - config:/config
      - metadata:/metadata
      - /mnt/thePool/thePoolShare/Media/Books:/books
      - /mnt/thePool/thePoolShare/Media/Audiobooks:/audiobooks
      - /mnt/thePool/thePoolShare/Media/Podcasts:/podcasts
    ports:
      - 9090:80
    restart: unless-stopped

volumes:
  config:
  metadata:
