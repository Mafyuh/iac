---
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.32.1
    container_name: audiobookshelf
    environment:
      - TZ=America/New_York
    volumes:
      - config:/config
      - metadata:/metadata
      - /mnt/thePool/thePoolShare/Media/Books:/books
      - /mnt/thePool/thePoolShare/Media/Audiobooks:/audiobooks
      - /mnt/thePool/thePoolShare/Media/Podcasts:/podcasts
    ports:
      - 9090:80
    restart: unless-stopped

  podsync:
    image: ghcr.io/mxpv/podsync:v2.8.0
    container_name: podsync
    volumes:
      - podsync_data:/app/data/
      - podsync_db:/app/db/
      - /mnt/ssd-appdata/appdata/podsync/config.toml:/app/config.toml
    ports:
      - 9091:8080

volumes:
  config:
  metadata:
  podsync_data:
  podsync_db:
