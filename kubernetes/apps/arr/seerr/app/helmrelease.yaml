---
# yaml-language-server: $schema=https://schemas.mafyuh.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app seerr
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: seerr
  values:
    global:
      fullnameOverride: *app
      namespace: arr

    controllers:
      seerr:
        enabled: true
        type: deployment

        replicas: 1

        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: &group 1000
            fsGroup: *group
            fsGroupChangePolicy: "OnRootMismatch"

        containers:
          app:
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: v3.3.0
              pullPolicy: IfNotPresent
            env:
              TZ: "${TZ}"
              LOG_LEVEL: info
              DB_TYPE: postgres
              DB_HOST: "pg-cluster-primary.databases.svc.cluster.local"
              DB_PORT: "5432"
              DB_USER: "jellyseerr"
              DB_PASS: ${SEERR_DB_PASS}
              DB_NAME: "jellyseerr"
              DB_LOG_QUERIES: "false"

            probes:
              liveness:
                enabled: false

            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi

    service:
      app:
        primary: true
        controller: seerr
        ports:
          http:
            port: &port 5055

    route:
      external:
        enabled: true
        kind: HTTPRoute
        hostnames: ["request.${PUBLIC_DOMAIN}"]
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: seerr
                port: *port
        parentRefs:
          - name: envoy-external
            namespace: kube-system
            sectionName: https

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/config
